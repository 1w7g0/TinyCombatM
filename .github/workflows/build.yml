name: Repository Checks

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publishable:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check publishable contents
      shell: pwsh
      run: ./scripts/AssertPublishable.ps1

  release:
    needs: publishable
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
